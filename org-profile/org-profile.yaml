api_version: appsec-advisor.org-profile/v2

organization:
  id: examplecorp
  name: Example Corp
  profile_version: "2026.06.1"
  owner: Example AppSec Team

compatibility:
  core: ">=0.4 <0.6"

policy:
  disable_opus: true

default_preset: ci-standard

requirements:
  source:
    requirements_yaml_url: "https://security.example.internal/appsec-requirements.yaml"
    human_source_url: "https://security.example.internal/appsec/requirements"
    label: "Example Corp AppSec Requirements"
    cache: true
    fail_mode: cache_fallback
  create_threat_model:
    default_active: true
    quick_default_active: false
  standalone_audit:
    enabled: true

llm_context:
  documents:
    - id: organization
      path: context/organization.md
      purpose: organization_background
      max_bytes: 50000

actors:
  inherit_defaults: true
  add: actors/*.yaml

presets:
  ci-standard:
    base_mode: standard
    outputs:
      yaml: true
      sarif: true
    requirements:
      enabled: true
    context:
      document_ids:
        - organization
    quality:
      qa_review: auto
      architecture_enrichment: auto
      architect_review: auto
      attack_walkthroughs: disabled
    guardrails:
      max_wall_time: 1h
      max_cost_usd: 20
      max_resumes: 2
      tracing: true

  release-review:
    base_mode: thorough
    outputs:
      yaml: true
      sarif: true
      pdf: true
      pentest_tasks: true
    requirements:
      enabled: true
    context:
      document_ids:
        - organization
    quality:
      qa_review: enabled
      architecture_enrichment: enabled
      architect_review: auto
      attack_walkthroughs: auto
    verification:
      evidence_recheck: sampled
      generate_pentest_verification_tasks: true
    guardrails:
      max_wall_time: 3h
      max_cost_usd: 80
      max_resumes: 4
      tracing: true
      verbose_report: true
