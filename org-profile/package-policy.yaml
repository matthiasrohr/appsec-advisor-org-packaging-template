# Build-time surface policy for the acme-appsec internal plugin package.
# Uses an allowlist: only the skills and hooks listed here are included in the
# built plugin. New upstream skills are excluded by default until explicitly added.
# Full list of available skills and hooks:
# https://github.com/matthiasrohr/appsec-advisor/blob/main/docs/internal-plugin-packaging.md
plugin_surface:
  skills:
    include:
      - create-threat-model
      - audit-security-requirements
      - verify-requirements
      - status
      - check-permissions
      - clean-run-state
      - fix-run-issues
      - threat-model-health
  hooks:
    include:
      - agent-logger
